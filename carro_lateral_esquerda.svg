    <!-- Silhueta Principal -->
    <path d="M120 220 L70 220 C60 220 50 210 50 200 L55 170 C57 155 70 145 85 145 L110 145" /> <!-- Parachoque frontal -->
    <path d="M110 145 C130 145 150 100 220 85 C280 72 450 72 520 85 C580 95 620 145 660 145" /> <!-- Teto e Capô -->
    <path d="M660 145 L720 145 C735 145 745 155 747 170 L752 200 C752 210 742 220 732 220 L680 220" /> <!-- Traseira -->
    
